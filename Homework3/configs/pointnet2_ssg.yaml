model: pointnet2_ssg
num_points: 1024
num_classes: 40
batch_size: 32
epochs: 200
lr: 0.01
weight_decay: 0.0001
optimizer: sgd
scheduler: step
step_size: 20
decay_rate: 0.7
use_normals: false
num_workers: 4
data_root: datasets/modelnet40_hdf5_2048
augment: pointnet2

wandb:
  project: pointnet2-modelnet40
  mode: offline   # offline = local only, "online" to sync to cloud
  name: ssg
